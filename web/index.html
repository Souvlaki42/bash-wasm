<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bash WASM</title>
    <style>
      body {
        background-color: #111;
        color: #eee;
      }
    </style>
    <script src="./bash.js"></script>
  </head>
  <body>
    <textarea name="input" id="input">echo hi</textarea>
    <br />
    <button id="run">Run</button>
    <br />
    <pre><code id="output">(output...)</code></pre>
    <script>
      const input = document.querySelector("#input");
      const btn = document.querySelector("#run");
      const output = document.querySelector("#output");

      btn.addEventListener("click", async () => {
        const module = await createBash({
          noInitialRun: true,
          print: (text) => (output.innerText += text + "\n"),
          printErr: (text) => (output.innerText += text + "\n"),
        });

        output.innerText = "";
        const text = input.value + "\n";

        module.FS.writeFile("/script", text);
        module.callMain(["/script"]);
      });
    </script>
  </body>
</html>
